name: Consensus Gap Fill

on:
  schedule:
    # Weekly: Monday at 2pm UTC
    - cron: '0 14 * * 1'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of terms to rate'
        required: false
        default: '20'
      panel:
        description: 'Which models to use (free or all)'
        required: false
        default: 'all'

permissions:
  contents: write
  actions: write

concurrency:
  group: consensus
  cancel-in-progress: false

jobs:
  gap-fill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r bot/requirements.txt

      - name: Run consensus gap-fill
        id: consensus
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '20' }}
          CONSENSUS_PANEL: ${{ github.event.inputs.panel || 'all' }}
          PYTHONPATH: ${{ github.workspace }}/bot
        working-directory: ${{ github.workspace }}
        run: python bot/consensus.py --mode gap-fill

      - name: Commit results
        run: |
          git config user.name "AI Dictionary Bot"
          git config user.email "bot@ai-dictionary.dev"
          git pull --rebase origin main || { git rebase --abort; echo "Rebase failed — aborting"; exit 1; }
          git add bot/consensus-data/ bot/consensus-state.json
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "Consensus gap-fill: rate ${{ steps.consensus.outputs.rated_count || 'N' }} terms"
          git push

      - name: Trigger API build
        if: steps.consensus.outputs.rated_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 5
          gh workflow run build-api.yml

      - name: Chain next batch
        if: steps.consensus.outputs.rated_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Rated ${{ steps.consensus.outputs.rated_count }} terms. Dispatching next gap-fill batch..."
          sleep 30
          gh workflow run consensus-gap-fill.yml -f batch_size=${{ github.event.inputs.batch_size || '20' }} -f panel=${{ github.event.inputs.panel || 'all' }}
