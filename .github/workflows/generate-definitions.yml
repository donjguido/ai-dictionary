name: Generate AI Dictionary Definitions

on:
  schedule:
    # Run every 4 hours — proposes a term only if none was added recently
    - cron: '30 */4 * * *'
  workflow_dispatch:
    inputs:
      skip_recency_check:
        description: 'Skip the 4-hour recency check'
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  actions: write

concurrency:
  group: gen-definitions
  cancel-in-progress: false

jobs:
  propose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for recency check via git log

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r bot/requirements.txt

      - name: Usage check
        id: governor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: python bot/usage_governor.py generate

      - name: Propose generated term
        if: steps.governor.outcome == 'success'
        id: propose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SKIP_RECENCY_CHECK: ${{ github.event.inputs.skip_recency_check || 'false' }}
          PYTHONPATH: ${{ github.workspace }}/bot
        working-directory: ${{ github.workspace }}
        run: python bot/propose_generated_term.py

      - name: Trigger review workflow
        if: steps.propose.outputs.issue_number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run review-submission.yml \
            -f issue_number=${{ steps.propose.outputs.issue_number }}

      - name: Commit rotation state
        if: steps.governor.outcome == 'success'
        run: |
          git config user.name "AI Dictionary Bot"
          git config user.email "bot@ai-dictionary.dev"
          git add bot/generate-rotation.json bot/api-config/tracker-state.json
          git diff --cached --quiet || (git commit -m "Update generation rotation state" && git pull --rebase && git push)
